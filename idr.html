<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>創意演示頁面 | 現代UI組件</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <!-- Font Awesome 6 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(145deg, #f0f4f8 0%, #e6ecf3 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      transition: background 0.4s ease, color 0.3s ease;
      color: #1e293b;
    }

    body.dark-mode {
      background: linear-gradient(145deg, #0f172a 0%, #1e293b 100%);
      color: #e2e8f0;
    }

    .demo-card {
      max-width: 850px;
      width: 100%;
      background: rgba(255, 255, 255, 0.75);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 2.5rem;
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.08), 0 10px 25px rgba(0, 20, 30, 0.1);
      padding: 2.5rem;
      transition: all 0.4s ease;
      border: 1px solid rgba(255, 255, 255, 0.5);
    }

    body.dark-mode .demo-card {
      background: rgba(30, 41, 59, 0.8);
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5), 0 10px 25px rgba(0, 0, 0, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.15);
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2.2rem;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .logo {
      font-weight: 700;
      font-size: 1.8rem;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #2563eb, #7c3aed);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .theme-toggle {
      background: rgba(255, 255, 255, 0.5);
      border: 1px solid rgba(255, 255, 255, 0.8);
      border-radius: 3rem;
      padding: 0.6rem 1.2rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.95rem;
      color: #1e293b;
      backdrop-filter: blur(10px);
      transition: 0.25s ease;
      box-shadow: 0 4px 10px rgba(0,0,0,0.03);
    }

    body.dark-mode .theme-toggle {
      background: rgba(51, 65, 85, 0.7);
      color: #f1f5f9;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .theme-toggle:hover {
      transform: scale(1.04);
      box-shadow: 0 8px 18px rgba(0,0,0,0.08);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 1.5rem;
      margin: 2rem 0 2.2rem;
    }

    .feature-item {
      background: rgba(255, 255, 255, 0.6);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 1.8rem;
      padding: 1.8rem 1.2rem;
      text-align: center;
      transition: all 0.3s ease;
      border: 1px solid rgba(255, 255, 255, 0.7);
      box-shadow: 0 10px 20px -8px rgba(0,0,0,0.05);
    }

    body.dark-mode .feature-item {
      background: rgba(51, 65, 85, 0.45);
      border: 1px solid rgba(255, 255, 255, 0.15);
    }

    .feature-item:hover {
      transform: translateY(-6px);
      background: rgba(255, 255, 255, 0.8);
      box-shadow: 0 22px 30px -12px rgba(0, 67, 156, 0.15);
    }

    body.dark-mode .feature-item:hover {
      background: rgba(71, 85, 105, 0.7);
      box-shadow: 0 22px 30px -12px rgba(0, 0, 0, 0.6);
    }

    .feature-icon {
      font-size: 2.4rem;
      margin-bottom: 0.9rem;
      color: #2563eb;
    }

    body.dark-mode .feature-icon {
      color: #818cf8;
    }

    .interaction-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 1.8rem;
      margin: 2rem 0 1.8rem;
      background: rgba(255, 255, 255, 0.5);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 2rem;
      padding: 1.5rem 2rem;
      border: 1px solid rgba(255, 255, 255, 0.7);
    }

    body.dark-mode .interaction-row {
      background: rgba(30, 41, 59, 0.55);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .counter-box {
      display: flex;
      align-items: center;
      gap: 1.2rem;
    }

    .counter-btn {
      background: white;
      border: none;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      font-size: 1.5rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 8px 16px rgba(0,0,0,0.05);
      transition: 0.2s;
      color: #1e293b;
    }

    body.dark-mode .counter-btn {
      background: #334155;
      color: #f1f5f9;
    }

    .counter-btn:hover {
      background: #2563eb;
      color: white;
      transform: scale(1.06);
    }

    #counterValue {
      font-size: 2.2rem;
      font-weight: 700;
      min-width: 60px;
      text-align: center;
    }

    .notification-area {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      flex-wrap: wrap;
    }

    .notify-btn {
      background: #0f172a;
      border: none;
      padding: 0.8rem 1.8rem;
      border-radius: 2.5rem;
      font-weight: 600;
      color: white;
      background: linear-gradient(135deg, #1e293b, #0f172a);
      display: flex;
      align-items: center;
      gap: 0.5rem;
      cursor: pointer;
      transition: 0.25s;
      box-shadow: 0 8px 18px rgba(15, 23, 42, 0.3);
    }

    body.dark-mode .notify-btn {
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
    }

    .notify-btn:hover {
      transform: translateY(-2px);
      filter: brightness(1.15);
    }

    .badge {
      background: #ef4444;
      color: white;
      border-radius: 50%;
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8rem;
      font-weight: 700;
    }

    .clear-notify-btn {
      background: transparent;
      border: 1px solid rgba(239, 68, 68, 0.5);
      color: #ef4444;
      padding: 0.5rem 1rem;
      border-radius: 2rem;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
      display: flex;
      align-items: center;
      gap: 0.3rem;
      background: rgba(255,255,255,0.4);
    }

    body.dark-mode .clear-notify-btn {
      background: rgba(51,65,85,0.6);
      color: #f87171;
      border-color: rgba(248,113,113,0.6);
    }

    .clear-notify-btn:hover {
      background: #ef4444;
      color: white;
      border-color: #ef4444;
    }

    .message-box {
      margin-top: 1.2rem;
      padding: 0.9rem 1.4rem;
      background: rgba(255,255,240,0.7);
      backdrop-filter: blur(10px);
      border-radius: 1.5rem;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      border: 1px solid rgba(0,0,0,0.05);
    }

    body.dark-mode .message-box {
      background: rgba(51, 65, 85, 0.6);
      border: 1px solid rgba(255,255,255,0.15);
    }

    .footer-note {
      text-align: center;
      margin-top: 1.8rem;
      font-size: 0.9rem;
      opacity: 0.65;
    }
  </style>
</head>
<body>
  <div class="demo-card">
    <div class="header">
      <span class="logo"><i class="fas fa-cube" style="margin-right: 6px;"></i>創意演示</span>
      <button class="theme-toggle" id="themeToggle">
        <i class="fas fa-moon" id="themeIcon"></i>
        <span id="themeText">深色模式</span>
      </button>
    </div>

    <div class="grid">
      <div class="feature-item">
        <div class="feature-icon"><i class="fas fa-bolt"></i></div>
        <h3>極速響應</h3>
        <p>高效動畫與互動</p>
      </div>
      <div class="feature-item">
        <div class="feature-icon"><i class="fas fa-mobile-alt"></i></div>
        <h3>完全響應式</h3>
        <p>適配各種裝置</p>
      </div>
      <div class="feature-item">
        <div class="feature-icon"><i class="fas fa-palette"></i></div>
        <h3>主題切換</h3>
        <p>深色/淺色模式</p>
      </div>
      <div class="feature-item">
        <div class="feature-icon"><i class="fas fa-shield-alt"></i></div>
        <h3>毛玻璃效果</h3>
        <p>現代設計風格</p>
      </div>
    </div>

    <div class="interaction-row">
      <div class="counter-box">
        <button class="counter-btn" id="decrementBtn"><i class="fas fa-minus"></i></button>
        <span id="counterValue">0</span>
        <button class="counter-btn" id="incrementBtn"><i class="fas fa-plus"></i></button>
      </div>
      <div class="notification-area">
        <button class="notify-btn" id="notifyBtn">
          <i class="fas fa-bell"></i> 顯示通知
          <span class="badge" id="notifyBadge" style="display: none;">0</span>
        </button>
        <button class="clear-notify-btn" id="clearNotifyBtn">
          <i class="fas fa-times"></i> 清除
        </button>
      </div>
    </div>

    <div id="dynamicMessage" class="message-box">
      <i class="fas fa-info-circle"></i> <span id="messageText">準備好開始互動了！點擊按鈕試試。</span>
    </div>
    <div class="footer-note">
      <i class="far fa-clock"></i> 香港時間 • 即時互動演示
    </div>
  </div>

  <script>
    (function() {
      // 獨立狀態：計數器與通知完全分離
      let counter = 0;
      let notificationCount = 0;
      let isDarkMode = false;

      // DOM 元素
      const body = document.body;
      const themeToggle = document.getElementById('themeToggle');
      const themeIcon = document.getElementById('themeIcon');
      const themeText = document.getElementById('themeText');
      const counterValueSpan = document.getElementById('counterValue');
      const decrementBtn = document.getElementById('decrementBtn');
      const incrementBtn = document.getElementById('incrementBtn');
      const notifyBtn = document.getElementById('notifyBtn');
      const notifyBadge = document.getElementById('notifyBadge');
      const clearNotifyBtn = document.getElementById('clearNotifyBtn');
      const messageText = document.getElementById('messageText');
      const dynamicMessageDiv = document.getElementById('dynamicMessage');

      // 更新消息
      function updateMessage(text) {
        messageText.textContent = text;
        dynamicMessageDiv.style.transition = '0.2s';
        dynamicMessageDiv.style.transform = 'scale(1.02)';
        setTimeout(() => {
          dynamicMessageDiv.style.transform = 'scale(1)';
        }, 150);
      }

      // 更新計數器顯示
      function updateCounterDisplay() {
        counterValueSpan.textContent = counter;
      }

      // 更新通知徽章
      function updateBadge() {
        if (notificationCount > 0) {
          notifyBadge.style.display = 'flex';
          notifyBadge.textContent = notificationCount;
        } else {
          notifyBadge.style.display = 'none';
        }
      }

      // 重置通知計數
      function resetNotifications() {
        if (notificationCount === 0) {
          updateMessage('📭 目前沒有新通知');
          return;
        }
        notificationCount = 0;
        updateBadge();
        updateMessage('✅ 所有通知已清除');
      }

      // 增加通知 (僅由通知按鈕觸發)
      function addNotification() {
        notificationCount++;
        updateBadge();
        updateMessage(`🔔 您有 ${notificationCount} 個新通知！`);
      }

      // 主題切換
      function applyTheme(dark) {
        if (dark) {
          body.classList.add('dark-mode');
          themeIcon.className = 'fas fa-sun';
          themeText.textContent = '淺色模式';
        } else {
          body.classList.remove('dark-mode');
          themeIcon.className = 'fas fa-moon';
          themeText.textContent = '深色模式';
        }
      }

      function toggleTheme() {
        isDarkMode = !isDarkMode;
        applyTheme(isDarkMode);
        updateMessage(isDarkMode ? '🌙 已切換至深色模式' : '☀️ 已切換至淺色模式');
      }

      // 計數器操作 (完全不影響通知)
      function incrementCounter() {
        counter++;
        updateCounterDisplay();
        updateMessage(`➕ 計數器增加至 ${counter}`);
      }

      function decrementCounter() {
        counter--;
        updateCounterDisplay();
        updateMessage(`➖ 計數器減少至 ${counter}`);
      }

      // 事件綁定
      themeToggle.addEventListener('click', toggleTheme);
      incrementBtn.addEventListener('click', incrementCounter);
      decrementBtn.addEventListener('click', decrementCounter);
      
      // 通知按鈕：僅增加通知計數
      notifyBtn.addEventListener('click', addNotification);
      
      // 清除按鈕：重置通知計數
      clearNotifyBtn.addEventListener('click', resetNotifications);

      // 點擊徽章本身也可清除通知
      notifyBadge.addEventListener('click', function(e) {
        e.stopPropagation();
        resetNotifications();
      });

      // 雙擊消息區域重置通知
      dynamicMessageDiv.addEventListener('dblclick', function() {
        resetNotifications();
      });

      // 初始化
      applyTheme(isDarkMode);
      updateCounterDisplay();
      updateBadge();
      updateMessage('👋 歡迎！計數器與通知已完全分離。');

      // 鍵盤快速鍵
      window.addEventListener('keydown', function(e) {
        if (e.key === '+' || e.key === '=') {
          e.preventDefault();
          incrementCounter();
        } else if (e.key === '-' || e.key === '_') {
          e.preventDefault();
          decrementCounter();
        } else if (e.key === 'n' || e.key === 'N') {
          e.preventDefault();
          addNotification();
        } else if (e.key === 'c' || e.key === 'C') {
          e.preventDefault();
          resetNotifications();
        } else if (e.key === 't' || e.key === 'T') {
          e.preventDefault();
          toggleTheme();
        }
      });
    })();
  </script>
</body>
</html>
